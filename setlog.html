<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SETLOG EDITOR</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d8d9dd;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #111;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-frame {
      position: relative;
      width: min(430px, 100vw);
      height: min(900px, 100vh);
      background: #070707;
      border-radius: 46px;
      padding: 12px;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.38),
        inset 0 0 0 2px rgba(255,255,255,0.08),
        inset 0 0 0 7px rgba(255,255,255,0.025);
      overflow: hidden;
    }

    .phone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 36px;
      overflow: hidden;
    }

    .phone-notch {
      position: absolute;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 24px;
      background: #090909;
      border-radius: 0 0 18px 18px;
      z-index: 30;
      pointer-events: none;
    }

    .app {
      width: 100%;
      height: 100%;
      padding: 44px 13px 15px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .round-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #f1f1f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 500;
      color: #111;
      user-select: none;
    }

    .title-pill {
      min-width: 158px;
      max-width: 210px;
      padding: 11px 20px;
      border-radius: 999px;
      background: #f3f3f3;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      outline: none;
    }

    .dots {
      flex: 0 0 auto;
      width: 100%;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 5px;
      color: #d5d5d5;
      font-size: 15px;
      line-height: 1;
      user-select: none;
    }

    .dots .active {
      color: #b66cff;
    }

    .feed {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow: hidden;
    }

    .set-card {
      position: relative;
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
      border-radius: 22px;
      overflow: hidden;
      background: #111;
      box-shadow:
        0 3px 10px rgba(0,0,0,0.08),
        inset 0 -50px 80px rgba(0,0,0,0.12);
      cursor: pointer;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      user-select: none;
      pointer-events: none;
    }

    .set-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,.36), rgba(0,0,0,.08)),
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.16));
      z-index: 1;
      pointer-events: none;
    }

    .profile-line {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 9px;
      max-width: calc(100% - 82px);
    }

    .profile-wrap {
      width: 39px;
      height: 39px;
      border-radius: 50%;
      overflow: hidden;
      background: #eee;
      border: 1px solid rgba(255,255,255,.68);
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
      flex-shrink: 0;
      cursor: pointer;
    }

    .profile-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .nickname {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,.45);
      letter-spacing: -0.4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      outline: none;
      cursor: text;
      min-width: 20px;
    }

    .message-box {
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      z-index: 3;
      width: 74%;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.48);
    }

    .time {
      font-size: clamp(17px, 5vw, 21px);
      font-weight: 850;
      letter-spacing: 3px;
      line-height: 1;
      outline: none;
      cursor: text;
      min-height: 1em;
    }

    .message {
      margin-top: 7px;
      font-size: clamp(12px, 3.4vw, 14px);
      font-weight: 650;
      line-height: 1.32;
      word-break: keep-all;
      outline: none;
      cursor: text;
      min-height: 1em;
    }

    [contenteditable="true"]:focus {
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 2px 5px;
    }

    .side-icons {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-43%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.35);
      pointer-events: none;
      user-select: none;
    }

    .side-icons span {
      font-size: 30px;
      line-height: 1;
      font-weight: 300;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 480px) {
      .phone-frame {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .phone-screen {
        border-radius: 0;
      }

      .phone-notch {
        top: 8px;
        width: 108px;
        height: 21px;
      }

      .app {
        padding: 40px 11px 14px;
      }

      .round-btn {
        width: 44px;
        height: 44px;
      }

      .title-pill {
        min-width: 150px;
        padding: 10px 18px;
      }

      .set-card {
        border-radius: 20px;
      }

      .profile-wrap {
        width: 36px;
        height: 36px;
      }

      .nickname {
        font-size: 15px;
      }

      .side-icons {
        right: 14px;
        gap: 18px;
      }

      .side-icons span {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="phone-notch"></div>

      <main class="app">
        <header class="top-bar">
          <div class="round-btn">‹</div>
          <div class="title-pill" contenteditable="true">SGIA SHIELD</div>
          <div class="round-btn">⇧</div>
        </header>

        <div class="dots">
          <span class="active">●</span><span>●</span><span class="active">●</span><span>●</span><span class="active">●</span><span>●</span><span class="active">●</span><span>●</span>
        </div>

        <section class="feed">

          <article class="set-card">
            <img class="bg-img" src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/ff60c83b-d49a-4115-b172-8abc81b20bce?v=4e0a68" alt="">
            <input class="hidden-file bg-input" type="file" accept="image/*">

            <div class="profile-line">
              <div class="profile-wrap">
                <img src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim-1920x/5b9c787c-c5bd-450a-ad2e-78d8046ae6e9?v=8ff5e2" alt="">
                <input class="hidden-file profile-input" type="file" accept="image/*">
              </div>
              <div class="nickname" contenteditable="true">원 혈</div>
            </div>

            <div class="message-box">
              <div class="time" contenteditable="true">08:00</div>
              <div class="message" contenteditable="true">훈련 시작이다. 지온 당장 훈련실로.</div>
            </div>

            <div class="side-icons">
              <span>↩</span>
              <span>♡</span>
            </div>
          </article>

          <article class="set-card">
            <img class="bg-img" src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/4c16f51d-ea6a-4877-8cac-d3e3457ff4dd?v=8eb456" alt="">
            <input class="hidden-file bg-input" type="file" accept="image/*">

            <div class="profile-line">
              <div class="profile-wrap">
                <img src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/11c1552e-7754-46e9-94d2-dc9e7213f465?v=fc408d" alt="">
                <input class="hidden-file profile-input" type="file" accept="image/*">
              </div>
              <div class="nickname" contenteditable="true">데인</div>
            </div>

            <div class="message-box">
              <div class="time" contenteditable="true">08:00</div>
              <div class="message" contenteditable="true">잠시만요~~^ ^</div>
            </div>

            <div class="side-icons">
              <span>↩</span>
              <span>♡</span>
            </div>
          </article>

          <article class="set-card">
            <img class="bg-img" src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/ecc4e652-6508-424c-882b-e8a1840aee8e?v=3c144f" alt="">
            <input class="hidden-file bg-input" type="file" accept="image/*">

            <div class="profile-line">
              <div class="profile-wrap">
                <img src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/d16e2b08-a975-4faf-949a-c9f6941fd7c7?v=b0c3b1" alt="">
                <input class="hidden-file profile-input" type="file" accept="image/*">
              </div>
              <div class="nickname" contenteditable="true">지온</div>
            </div>

            <div class="message-box">
              <div class="time" contenteditable="true">08:00</div>
              <div class="message" contenteditable="true" style="font-size:18px;">Zzz</div>
            </div>

            <div class="side-icons">
              <span>↩</span>
              <span>♡</span>
            </div>
          </article>

          <article class="set-card">
            <img class="bg-img" src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/50a7d056-3da2-4d93-85fa-459fdb86b26b?v=b794c9" alt="">
            <input class="hidden-file bg-input" type="file" accept="image/*">

            <div class="profile-line">
              <div class="profile-wrap">
                <img src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/10f105ac-30a3-44be-93ea-a2613bc9f919?v=eba775" alt="">
                <input class="hidden-file profile-input" type="file" accept="image/*">
              </div>
              <div class="nickname" contenteditable="true">SD</div>
            </div>

            <div class="message-box">
              <div class="time" contenteditable="true">08:00</div>
              <div class="message" contenteditable="true">수면 패턴이 신생아 같군. 지각 확률 100%</div>
            </div>

            <div class="side-icons">
              <span>↩</span>
              <span>♡</span>
            </div>
          </article>

          <article class="set-card">
            <img class="bg-img" src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/ecf4866c-5dc1-4ad9-85a8-04f4f094d67d?v=359c2a" alt="">
            <input class="hidden-file bg-input" type="file" accept="image/*">

            <div class="profile-line">
              <div class="profile-wrap">
                <img src="https://cdn.caveduck.io/cdn-cgi/image/dpr=2,f=auto,w=800/charim/977f2cac-d41f-4c02-8bb2-47c69947d69d?v=5fc8c1" alt="">
                <input class="hidden-file profile-input" type="file" accept="image/*">
              </div>
              <div class="nickname" contenteditable="true">백진</div>
            </div>

            <div class="message-box">
              <div class="time" contenteditable="true">08:00</div>
              <div class="message" contenteditable="true">천천히 오십쇼...!</div>
            </div>

            <div class="side-icons">
              <span>↩</span>
              <span>♡</span>
            </div>
          </article>

        </section>
      </main>
    </div>
  </div>

  <script>
    const editableTexts = document.querySelectorAll('[contenteditable="true"]');

    editableTexts.forEach((el) => {
      el.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      el.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          el.blur();
        }
      });
    });

    document.querySelectorAll('.profile-wrap').forEach((wrap) => {
      const input = wrap.querySelector('.profile-input');
      const img = wrap.querySelector('img');

      wrap.addEventListener('click', (event) => {
        event.stopPropagation();
        input.click();
      });

      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) return;

        const url = URL.createObjectURL(file);
        img.src = url;
      });
    });

    document.querySelectorAll('.set-card').forEach((card) => {
      const bgInput = card.querySelector('.bg-input');
      const bgImg = card.querySelector('.bg-img');

      card.addEventListener('click', (event) => {
        const isEditingText = event.target.closest('[contenteditable="true"]');
        const isProfile = event.target.closest('.profile-wrap');

        if (isEditingText || isProfile) return;

        bgInput.click();
      });

      bgInput.addEventListener('change', () => {
        const file = bgInput.files[0];
        if (!file) return;

        const url = URL.createObjectURL(file);
        bgImg.src = url;
      });
    });
  </script>
</body>
</html>
