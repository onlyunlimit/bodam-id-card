<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiyeon App v3</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* tailwind utilities that might be needed by lucide icons or layouts */
    .lucide {
      width: 1em;
      height: 1em;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Babel Standalone (for JSX parsing in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- React Application -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Calendar as CalendarIcon, MapPin, CheckCircle, Plus, 
      Book, Edit3, Trash2, X, Check, Save
    } from 'https://esm.sh/lucide-react@0.294.0';
    // API BASE URL MUST POINT TO THE BACKEND TUNNEL URL (Set to loca.lt dynamically later, or use localhost if local)
    const API_BASE_URL = window.location.hostname.includes('loca.lt') 
      ? `https://jiyeon-api-2026.loca.lt` 
      : 'http://localhost:8080';
    const fetchOptions = {
      headers: {
        'Bypass-Tunnel-Reminder': 'true', // Important for Localtunnel
        'Content-Type': 'application/json'
      }
    };
    const JiyeonAppV3 = () => {
      const [activeTab, setActiveTab] = useState('travel');
      const [isLoading, setIsLoading] = useState(true);
      
      const [travelLogs, setTravelLogs] = useState([]);
      const [isLogEditing, setIsLogEditing] = useState(null);
      const fileInputRef = useRef(null);
      const [studyGoals, setStudyGoals] = useState([]);
      const [selectedGoalId, setSelectedGoalId] = useState(null);
      const [todos, setTodos] = useState([]);
      useEffect(() => {
        fetchData();
      }, []);
      const fetchData = async () => {
        try {
          const res = await fetch(`${API_BASE_URL}/api/data`, { headers: fetchOptions.headers });
          if (res.ok) {
            const data = await res.json();
            setTravelLogs(data.travelLogs || []);
            setStudyGoals(data.studyGoals || []);
            setTodos(data.todos || []);
          }
        } catch (err) {
          console.error("Failed to fetch data", err);
        } finally {
          setIsLoading(false);
        }
      };
      // --- TRAVEL ---
      const addTravelLog = async () => {
        const newLogData = { date: new Date().toISOString().split('T')[0], location: "새 장소", summary: "" };
        try {
          const res = await fetch(`${API_BASE_URL}/api/travel`, { method: 'POST', ...fetchOptions, body: JSON.stringify(newLogData) });
          if (res.ok) {
            const savedLog = await res.json();
            setTravelLogs([savedLog, ...travelLogs]);
            setIsLogEditing(savedLog.id);
          }
        } catch (err) { console.error(err); }
      };
      const saveTravelLog = async (log) => {
        try {
          await fetch(`${API_BASE_URL}/api/travel/${log.id}`, { method: 'PUT', ...fetchOptions, body: JSON.stringify(log) });
        } catch (err) { console.error(err); }
      };
      const deleteTravelLog = async (id) => {
        try {
          await fetch(`${API_BASE_URL}/api/travel/${id}`, { method: 'DELETE', headers: fetchOptions.headers });
          setTravelLogs(travelLogs.filter(l => l.id !== id));
        } catch (err) { console.error(err); }
      };
      const handleImageUpload = async (logId, files) => {
        const fileList = Array.from(files).slice(0, 5);
        const formData = new FormData();
        fileList.forEach(file => formData.append('photos', file));
        try {
          const res = await fetch(`${API_BASE_URL}/api/travel/${logId}/photos`, { 
            method: 'POST', 
            headers: { 'Bypass-Tunnel-Reminder': 'true' }, // No content-type so browser sets multipart boundary
            body: formData 
          });
          if (res.ok) {
            const result = await res.json();
            setTravelLogs(travelLogs.map(log => log.id === logId ? { ...log, photos: [...(log.photos || []), ...result.photos] } : log));
          }
        } catch (err) { console.error(err); }
      };
      // --- STUDY GOALS ---
      const addStudyGoal = async () => {
        const newGoalData = { title: "새 목표", targetDate: "", hasDDay: false, memo: "" };
        try {
          const res = await fetch(`${API_BASE_URL}/api/study`, { method: 'POST', ...fetchOptions, body: JSON.stringify(newGoalData) });
          if (res.ok) {
            const savedGoal = await res.json();
            setStudyGoals([...studyGoals, savedGoal]);
            setSelectedGoalId(savedGoal.id);
          }
        } catch (err) { console.error(err); }
      };
      const saveStudyGoal = async (goal) => {
        try {
          await fetch(`${API_BASE_URL}/api/study/${goal.id}`, { method: 'PUT', ...fetchOptions, body: JSON.stringify(goal) });
        } catch (err) { console.error(err); }
      };
      // --- TODOS ---
      const addTodo = async (text) => {
        if (!text) return;
        try {
          const res = await fetch(`${API_BASE_URL}/api/todos`, { method: 'POST', ...fetchOptions, body: JSON.stringify({ text }) });
          if (res.ok) {
            const savedTodo = await res.json();
            setTodos([...todos, savedTodo]);
          }
        } catch (err) { console.error(err); }
      };
      const toggleTodo = async (todo) => {
        const updated = { ...todo, completed: !todo.completed };
        setTodos(todos.map(t => t.id === todo.id ? updated : t));
        try {
          await fetch(`${API_BASE_URL}/api/todos/${todo.id}`, { method: 'PUT', ...fetchOptions, body: JSON.stringify(updated) });
        } catch (err) { console.error(err); }
      };
      const deleteTodo = async (id) => {
        setTodos(todos.filter(t => t.id !== id));
        try {
          await fetch(`${API_BASE_URL}/api/todos/${id}`, { method: 'DELETE', headers: fetchOptions.headers });
        } catch (err) { console.error(err); }
      };
      if (isLoading) return <div className="flex h-screen items-center justify-center font-bold">로딩 중...</div>;
      return (
        <div className="flex h-screen bg-white text-slate-800 font-sans overflow-hidden">
          <aside className="w-72 bg-slate-50 border-r border-slate-100 p-8 flex flex-col gap-4 relative">
            <h1 className="text-3xl font-black text-[#007AFF] mb-8 italic">JIYEON</h1>
            {[
              { id: 'travel', label: '2025년', icon: MapPin },
              { id: 'exam', label: '2026년', icon: Book },
              { id: 'wishlist', label: '2027년+', icon: CheckCircle }
            ].map(item => (
              <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex items-center gap-3 p-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-white shadow-md text-[#007AFF] ring-1 ring-blue-100' : 'text-slate-400 hover:bg-slate-100'}`}>
                <item.icon size={20} /> <span className="font-bold">{item.label}</span>
              </button>
            ))}
            <div className="mt-auto bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between">
              <span className="font-bold text-sm text-slate-600 truncate mr-2">지연 (게스트 모드)</span>
            </div>
          </aside>
          <main className="flex-1 p-12 overflow-y-auto bg-white">
            {/* TRAVEL TAB */}
            {activeTab === 'travel' && (
              <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                <div className="flex justify-between items-center mb-10">
                  <h2 className="text-4xl font-extrabold tracking-tight">2025 여행 일지</h2>
                  <button onClick={addTravelLog} className="bg-[#007AFF] text-white px-5 py-2.5 rounded-full flex items-center gap-2 hover:bg-blue-600 shadow-lg transition-all"><Plus size={20} /> 추가하기</button>
                </div>
                <div className="space-y-8">
                  {travelLogs.length === 0 && <p className="text-slate-400 text-center py-10">아직 추가된 일지가 없습니다.</p>}
                  {travelLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(log => (
                    <div key={log.id} className="bg-slate-50 rounded-[2rem] p-8 border border-slate-100">
                      <div className="flex justify-between items-start mb-6">
                        {isLogEditing === log.id ? (
                          <div className="flex flex-col gap-2 w-full pr-12">
                            <input type="date" value={log.date} onChange={(e) => setTravelLogs(travelLogs.map(l => l.id === log.id ? {...l, date: e.target.value} : l))} onBlur={() => saveTravelLog(travelLogs.find(l => l.id === log.id))} className="p-2 rounded-lg border focus:ring-2 focus:ring-blue-400 outline-none" />
                            <input type="text" value={log.location} placeholder="위치 입력" onChange={(e) => setTravelLogs(travelLogs.map(l => l.id === log.id ? {...l, location: e.target.value} : l))} onBlur={() => saveTravelLog(travelLogs.find(l => l.id === log.id))} className="p-2 rounded-lg border focus:ring-2 focus:ring-blue-400 outline-none" />
                          </div>
                        ) : (
                          <div>
                            <span className="text-blue-500 font-bold text-sm bg-blue-50 px-3 py-1 rounded-full">{log.date}</span>
                            <h3 className="text-2xl font-bold mt-2">📍 {log.location}</h3>
                          </div>
                        )}
                        <div className="flex gap-2">
                          <button onClick={() => {
                            if (isLogEditing === log.id) { saveTravelLog(travelLogs.find(l => l.id === log.id)); setIsLogEditing(null); } 
                            else { setIsLogEditing(log.id); }
                          }} className="p-2 text-slate-400 hover:text-blue-500 bg-white rounded-full shadow-sm">
                            {isLogEditing === log.id ? <Check size={18} /> : <Edit3 size={18} />}
                          </button>
                          <button onClick={() => deleteTravelLog(log.id)} className="p-2 text-slate-400 hover:text-red-500 bg-white rounded-full shadow-sm">
                            <Trash2 size={18} />
                          </button>
                        </div>
                      </div>
                      <div className="grid grid-cols-5 gap-3 mb-6">
                        {(log.photos || []).map((url, idx) => (
                          <div key={idx} className="relative aspect-square rounded-xl overflow-hidden shadow-sm">
                            <img src={url} className="w-full h-full object-cover" alt="travel" />
                          </div>
                        ))}
                        {(log.photos || []).length < 5 && isLogEditing === log.id && (
                          <button onClick={() => fileInputRef.current?.click()} className="aspect-square rounded-xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-400 hover:border-blue-400 hover:text-blue-400 bg-white transition-all">
                            <Plus size={24} /> <span className="text-[10px] mt-1 font-bold">ADD</span>
                            <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={(e) => handleImageUpload(log.id, e.target.files)} />
                          </button>
                        )}
                      </div>
                      {isLogEditing === log.id ? (
                        <textarea value={log.summary} onChange={(e) => setTravelLogs(travelLogs.map(l => l.id === log.id ? {...l, summary: e.target.value} : l))} onBlur={() => saveTravelLog(travelLogs.find(l => l.id === log.id))} className="w-full p-4 rounded-xl border h-24 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="오늘의 요약..." />
                      ) : (
                        <div className="bg-white p-6 rounded-2xl border border-slate-100 italic text-slate-600 leading-relaxed font-medium">
                          "{log.summary || "기록이 없습니다."}"
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* STUDY TAB */}
            {activeTab === 'exam' && (
              <div className="flex gap-10 h-full animate-in slide-in-from-right-8 duration-500">
                <div className="flex-1 max-w-md">
                  <div className="flex justify-between items-center mb-8">
                    <h2 className="text-4xl font-extrabold">2026 플랜</h2>
                    <button onClick={addStudyGoal} className="text-[#007AFF] hover:bg-blue-50 p-2 rounded-full"><Plus size={28}/></button>
                  </div>
                  <div className="space-y-4">
                    {studyGoals.map(goal => (
                      <div key={goal.id} onClick={() => setSelectedGoalId(goal.id)} className={`p-5 rounded-2xl border cursor-pointer transition-all ${selectedGoalId === goal.id ? 'bg-[#007AFF] text-white border-transparent shadow-lg' : 'bg-slate-50 border-slate-100 hover:border-blue-300'}`}>
                        <div className="flex justify-between items-center">
                          <span className="font-bold text-lg">{goal.title}</span>
                          {goal.hasDDay && goal.targetDate && (
                            <span className={`text-[10px] font-black px-2 py-1 rounded-full ${selectedGoalId === goal.id ? 'bg-white/20' : 'bg-blue-100 text-blue-500'}`}>
                              D-{Math.ceil((new Date(goal.targetDate) - new Date()) / (1000*60*60*24))}
                            </span>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="flex-[1.5] bg-slate-50 rounded-[2.5rem] p-10 border border-slate-100 flex flex-col gap-8">
                  {selectedGoalId ? (
                    <>
                      <div className="space-y-4">
                        <input type="text" value={studyGoals.find(g=>g.id===selectedGoalId)?.title || ''} 
                          onChange={(e) => setStudyGoals(studyGoals.map(g=>g.id===selectedGoalId ? {...g, title: e.target.value} : g))} 
                          onBlur={() => saveStudyGoal(studyGoals.find(g=>g.id===selectedGoalId))}
                          className="text-3xl font-black bg-transparent outline-none w-full border-b-2 border-transparent focus:border-blue-400" />
                        
                        <div className="flex items-center gap-4">
                          <label className="flex items-center gap-2 text-sm font-bold text-slate-400">
                            <input type="checkbox" checked={studyGoals.find(g=>g.id===selectedGoalId)?.hasDDay || false} 
                              onChange={(e) => {
                                const updated = studyGoals.map(g=>g.id===selectedGoalId ? {...g, hasDDay: e.target.checked} : g);
                                setStudyGoals(updated);
                                saveStudyGoal(updated.find(g=>g.id===selectedGoalId));
                              }} /> 디데이 사용
                          </label>
                          {studyGoals.find(g=>g.id===selectedGoalId)?.hasDDay && (
                            <input type="date" value={studyGoals.find(g=>g.id===selectedGoalId)?.targetDate || ''} 
                              onChange={(e) => {
                                const updated = studyGoals.map(g=>g.id===selectedGoalId ? {...g, targetDate: e.target.value} : g);
                                setStudyGoals(updated);
                                saveStudyGoal(updated.find(g=>g.id===selectedGoalId));
                              }} className="p-1 rounded bg-white text-xs border" />
                          )}
                        </div>
                        <textarea value={studyGoals.find(g=>g.id===selectedGoalId)?.memo || ''} 
                          onChange={(e) => setStudyGoals(studyGoals.map(g=>g.id===selectedGoalId ? {...g, memo: e.target.value} : g))} 
                          onBlur={() => saveStudyGoal(studyGoals.find(g=>g.id===selectedGoalId))}
                          className="w-full h-40 bg-white p-6 rounded-2xl border-none shadow-sm outline-none text-slate-500" placeholder="목표에 대한 상세 계획..." />
                      </div>
                    </>
                  ) : (
                    <div className="h-full flex items-center justify-center text-slate-300 font-medium">목표를 선택해주세요.</div>
                  )}
                </div>
              </div>
            )}
            {/* WISHLIST TAB */}
            {activeTab === 'wishlist' && (
              <div className="flex gap-10 h-full animate-in zoom-in-95 duration-500">
                <div className="flex-1 bg-slate-50 rounded-[2.5rem] p-10 border border-slate-100 flex flex-col">
                  <h2 className="text-4xl font-extrabold mb-8">투두리스트</h2>
                  <div className="flex gap-2 mb-6">
                    <input id="new-todo" type="text" placeholder="미래의 꿈 추가..." className="flex-1 p-4 rounded-2xl border-none shadow-sm outline-none" onKeyDown={(e) => { if(e.key === 'Enter') { addTodo(e.target.value); e.target.value = ''; }}} />
                    <button onClick={() => { const input = document.getElementById('new-todo'); addTodo(input.value); input.value = ''; }} className="bg-[#007AFF] text-white p-4 rounded-2xl shadow-lg shadow-blue-100"><Plus/></button>
                  </div>
                  <div className="space-y-3 overflow-y-auto pr-2">
                    {todos.map(todo => (
                      <div key={todo.id} className="bg-white p-4 rounded-2xl flex items-center justify-between group shadow-sm">
                        <div className="flex items-center gap-4">
                          <input type="checkbox" checked={todo.completed} onChange={() => toggleTodo(todo)} className="w-5 h-5 accent-[#007AFF]" />
                          <span className={`font-medium ${todo.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>{todo.text}</span>
                        </div>
                        <button onClick={() => deleteTodo(todo.id)} className="text-slate-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"><Trash2 size={16}/></button>
                      </div>
                    ))}
                  </div>
                </div>
                
                <div className="w-[450px] bg-slate-100 rounded-[2.5rem] overflow-hidden border border-slate-200 relative group">
                  <div className="absolute top-6 left-6 z-10 bg-white/90 backdrop-blur px-4 py-2 rounded-2xl shadow-md border border-white">
                    <h3 className="text-sm font-black text-slate-800 flex items-center gap-2"><MapPin size={14} className="text-blue-500"/> 내 미래 지도</h3>
                  </div>
                  <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1024!2d2.2945!3d48.8584!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDjCsDUxJzMwLjIiTiAywrAxNyc0MC4yIkU!5e0!3m2!1sko!2skr!4v1" 
                    className="w-full h-full border-none opacity-80 group-hover:opacity-100 transition-opacity"
                    allowFullScreen loading="lazy"
                  ></iframe>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };
    const root = createRoot(document.getElementById('root'));
    root.render(<JiyeonAppV3 />);
  </script>
</body>
</html>
